<style>
#replay-map { width: 100%; height: calc(100vh - 160px); }
#range-panel {
    background: #111;
    border-bottom: 1px solid #333;
    padding: 8px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
}
#range-panel label { color: #888; font-size: 12px; }
#range-panel input[type="datetime-local"] {
    background: #222;
    color: #00ff88;
    border: 1px solid #333;
    padding: 4px 8px;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    border-radius: 3px;
}
#range-panel input[type="datetime-local"]::-webkit-calendar-picker-indicator { filter: invert(0.6); }
#controls {
    background: #111;
    border-top: 1px solid #333;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 16px;
    height: 79px;
}
#slider-container { flex: 1; position: relative; }
#time-slider { width: 100%; accent-color: #00ff88; }
#event-track {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
}
.event-dot {
    position: absolute;
    width: 6px; height: 6px;
    border-radius: 50%;
    top: 50%; transform: translateY(-50%);
    pointer-events: auto;
    cursor: pointer;
    z-index: 10;
}
#time-display { color: #00ff88; font-size: 14px; font-weight: bold; min-width: 200px; }
#ac-count {
    color: #00ff88; font-size: 14px; font-weight: bold;
    background: #1a1a1a; border: 1px solid #333;
    padding: 4px 10px; border-radius: 3px; min-width: 40px; text-align: center;
}
.ctrl-btn {
    background: #222;
    color: #00ff88;
    border: 1px solid #333;
    padding: 8px 16px;
    cursor: pointer;
    font-family: 'Courier New', monospace;
    border-radius: 3px;
}
.ctrl-btn:hover { border-color: #00ff88; }
.ctrl-btn.active { background: #00ff88; color: #000; }
.ctrl-btn:disabled { opacity: 0.4; cursor: not-allowed; }
#speed-label { color: #888; font-size: 12px; }
#data-info { color: #888; font-size: 12px; margin-left: auto; }
#timestamp-overlay {
    position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.75); color: #00ff88;
    font-family: 'Courier New', monospace; font-size: 18px; font-weight: bold;
    padding: 6px 16px; border-radius: 4px; border: 1px solid #333;
    pointer-events: none; z-index: 1000; display: none;
}
.leaflet-container { background: #0a0a0a; }
</style>
<div id="range-panel">
    <label>From:</label>
    <input type="datetime-local" id="range-start">
    <label>To:</label>
    <input type="datetime-local" id="range-end">
    <button class="ctrl-btn" id="load-range">Load Range</button>
    <button class="ctrl-btn" id="load-all">Load All</button>
    <span id="data-info">Loading...</span>
</div>
<div id="replay-map"></div>
<div id="controls">
    <button class="ctrl-btn" id="play-btn">Play</button>
    <div id="slider-container">
        <input type="range" id="time-slider" min="0" max="10000" value="0">
        <div id="event-track"></div>
    </div>
    <span id="ac-count" title="Active aircraft">0</span>
    <span id="time-display">--</span>
    <button class="ctrl-btn" id="speed-down">-</button>
    <span id="speed-label" style="min-width:40px;text-align:center;">1x</span>
    <button class="ctrl-btn" id="speed-up">+</button>
</div>
<div id="timestamp-overlay"></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const map = L.map('replay-map', { zoomControl: true });
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OSM &copy; CARTO', maxZoom: 19,
}).addTo(map);

let allPositions = [];
let acIndex = {};       // icao -> [pos, ...] sorted by timestamp
let timeMin = 0, timeMax = 0;
let playing = false;
let currentTime = 0;
let playSpeed = 1;
const speeds = [1, 2, 5, 10, 30, 60, 120, 300, 600];
let speedIdx = 0;
const markers = {};
const trails = {};
let events = [];

// ---- Altitude color ----
function altColor(alt) {
    if (alt == null) return '#888';
    const t = Math.min(Math.max(alt / 40000, 0), 1);
    if (t < 0.5) {
        const s = t * 2;
        return `rgb(${Math.round(s * 255)},255,0)`;
    } else {
        const s = (t - 0.5) * 2;
        return `rgb(255,${Math.round((1 - s) * 255)},0)`;
    }
}

// ---- Aircraft classification ----
function classifyAircraft(p) {
    if (p.is_military) return 'military';
    if (p.speed_kts != null) {
        if (p.speed_kts > 250) return 'jet';
        if (p.speed_kts < 80 && p.altitude_ft != null && p.altitude_ft < 3000) return 'helicopter';
        if (p.speed_kts <= 180) return 'prop';
        if (p.speed_kts <= 250) return 'turboprop';
    }
    if (p.altitude_ft != null) {
        if (p.altitude_ft > 30000) return 'jet';
        if (p.altitude_ft < 5000) return 'prop';
    }
    return 'jet';
}

const acSvgs = {
    jet: (color) => `<path d="M12,2 L14,8 L14,10 L22,14 L22,16 L14,14 L14,19 L17,21 L17,23 L12,21 L7,23 L7,21 L10,19 L10,14 L2,16 L2,14 L10,10 L10,8 Z" fill="${color}" stroke="#000" stroke-width="0.4"/>`,
    prop: (color) => `<path d="M12,3 L13.5,9 L13,10 L18,13 L18,14.5 L13,13 L13,19 L15,21 L15,22.5 L12,21 L9,22.5 L9,21 L11,19 L11,13 L6,14.5 L6,13 L11,10 L10.5,9 Z" fill="${color}" stroke="#000" stroke-width="0.4"/>`,
    turboprop: (color) => `<path d="M12,2.5 L13.5,8.5 L13.5,10 L20,13.5 L20,15 L13.5,13 L13.5,19 L16,21 L16,22.5 L12,21 L8,22.5 L8,21 L10.5,19 L10.5,13 L4,15 L4,13.5 L10.5,10 L10.5,8.5 Z" fill="${color}" stroke="#000" stroke-width="0.4"/>`,
    helicopter: (color) => `<circle cx="12" cy="13" r="4" fill="${color}" stroke="#000" stroke-width="0.4"/>
        <line x1="4" y1="9" x2="20" y2="9" stroke="${color}" stroke-width="1.5"/>
        <line x1="12" y1="9" x2="12" y2="13" stroke="${color}" stroke-width="1"/>
        <line x1="10" y1="17" x2="14" y2="17" stroke="${color}" stroke-width="1"/>
        <line x1="12" y1="17" x2="12" y2="21" stroke="${color}" stroke-width="1"/>
        <line x1="9" y1="21" x2="15" y2="21" stroke="${color}" stroke-width="1.2"/>`,
    military: (color) => `<path d="M12,1 L14.5,7 L14,9 L22,12 L22,14 L14,12.5 L14,18 L17,20.5 L17,22 L12,20 L7,22 L7,20.5 L10,18 L10,12.5 L2,14 L2,12 L10,9 L9.5,7 Z" fill="${color}" stroke="#000" stroke-width="0.5"/>`,
};

function acIcon(heading, isMilitary, acType) {
    const color = isMilitary ? '#ff4444' : '#00ff88';
    const type = acType || (isMilitary ? 'military' : 'jet');
    const svgBody = (acSvgs[type] || acSvgs.jet)(color);
    const rotation = heading || 0;
    return L.divIcon({
        className: '',
        html: `<svg width="24" height="24" viewBox="0 0 24 24" style="transform:rotate(${rotation}deg)">${svgBody}</svg>`,
        iconSize: [24, 24],
        iconAnchor: [12, 12],
    });
}

// ---- Date/time helpers ----
function toDateTimeLocal(ts) {
    const d = new Date(ts * 1000);
    const pad = n => String(n).padStart(2, '0');
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
function fromDateTimeLocal(str) {
    return new Date(str).getTime() / 1000;
}
function formatTime(ts) {
    const d = new Date(ts * 1000);
    return d.toLocaleDateString() + ' ' + d.toLocaleTimeString();
}

// ---- Interpolation ----
function lerpAngle(a, b, t) {
    if (a == null || b == null) return b;
    let diff = b - a;
    if (diff > 180) diff -= 360;
    if (diff < -180) diff += 360;
    return ((a + diff * t) % 360 + 360) % 360;
}

function interpolateAt(icao, time) {
    const pts = acIndex[icao];
    if (!pts || pts.length === 0) return null;
    if (time < pts[0].timestamp) return null;
    if (time >= pts[pts.length - 1].timestamp) {
        // Stale if last point is more than 5 min before currentTime
        if (time - pts[pts.length - 1].timestamp > 300) return null;
        return pts[pts.length - 1];
    }
    // Binary search for bracketing pair
    let lo = 0, hi = pts.length - 1;
    while (lo < hi - 1) {
        const mid = (lo + hi) >> 1;
        if (pts[mid].timestamp <= time) lo = mid;
        else hi = mid;
    }
    const a = pts[lo], b = pts[hi];
    // Don't interpolate across gaps > 5 min
    if (b.timestamp - a.timestamp > 300) {
        return (time - a.timestamp < 300) ? a : null;
    }
    const t = (time - a.timestamp) / (b.timestamp - a.timestamp);
    return {
        icao: b.icao,
        lat: a.lat + (b.lat - a.lat) * t,
        lon: a.lon + (b.lon - a.lon) * t,
        altitude_ft: (a.altitude_ft != null && b.altitude_ft != null)
            ? Math.round(a.altitude_ft + (b.altitude_ft - a.altitude_ft) * t)
            : (b.altitude_ft ?? a.altitude_ft),
        speed_kts: b.speed_kts,
        heading_deg: lerpAngle(a.heading_deg, b.heading_deg, t),
        vertical_rate_fpm: b.vertical_rate_fpm,
        is_military: b.is_military,
        callsign: b.callsign,
        registration: b.registration,
        timestamp: time,
    };
}

function getTrailPoints(icao, upToTime) {
    const pts = acIndex[icao];
    if (!pts) return [];
    const result = [];
    for (const p of pts) {
        if (p.timestamp > upToTime) break;
        result.push(p);
    }
    return result;
}

// ---- Build per-aircraft index ----
function buildIndex(positions) {
    acIndex = {};
    for (const p of positions) {
        if (!acIndex[p.icao]) acIndex[p.icao] = [];
        acIndex[p.icao].push(p);
    }
}

// ---- Data loading ----
function loadPositions(start, end) {
    const params = new URLSearchParams();
    if (start != null) params.set('start', start);
    if (end != null) params.set('end', end);
    params.set('limit', '100000');

    const url = '/api/positions/all' + (params.toString() ? '?' + params : '');
    document.getElementById('data-info').textContent = 'Loading...';
    document.getElementById('play-btn').disabled = true;

    // Clear existing
    Object.keys(markers).forEach(k => { map.removeLayer(markers[k]); delete markers[k]; });
    Object.keys(trails).forEach(k => { trails[k].forEach(s => map.removeLayer(s)); delete trails[k]; });

    fetch(url)
        .then(r => r.json())
        .then(data => {
            allPositions = data;
            buildIndex(allPositions);
            if (allPositions.length === 0) {
                document.getElementById('data-info').textContent = 'No position data in range';
                document.getElementById('time-display').textContent = '--';
                timeMin = 0; timeMax = 0;
                return;
            }
            timeMin = allPositions[0].timestamp;
            timeMax = allPositions[allPositions.length - 1].timestamp;
            currentTime = timeMin;

            // Set date pickers to loaded range
            document.getElementById('range-start').value = toDateTimeLocal(timeMin);
            document.getElementById('range-end').value = toDateTimeLocal(timeMax);

            const uniqueIcao = new Set(allPositions.map(p => p.icao));
            document.getElementById('data-info').textContent =
                `${allPositions.length.toLocaleString()} pts, ${uniqueIcao.size} aircraft`;

            map.setView([allPositions[0].lat, allPositions[0].lon], 8);
            document.getElementById('play-btn').disabled = false;
            loadEvents();
            updateDisplay();
        })
        .catch(err => {
            document.getElementById('data-info').textContent = 'Load failed';
            console.error(err);
        });
}

// ---- Event markers on timeline ----
function loadEvents() {
    fetch('/api/events?limit=500')
        .then(r => r.json())
        .then(data => {
            events = data.filter(e => e.timestamp >= timeMin && e.timestamp <= timeMax);
            renderEventMarkers();
        })
        .catch(() => { events = []; });
}

function renderEventMarkers() {
    const track = document.getElementById('event-track');
    track.innerHTML = '';
    if (timeMax <= timeMin) return;

    const typeColors = {
        geofence_entry: '#ff8800',
        geofence_exit: '#ffcc00',
        military: '#ff4444',
        squawk7700: '#ff0000',
        squawk7600: '#ff6600',
        squawk7500: '#ff00ff',
    };

    for (const ev of events) {
        const pct = ((ev.timestamp - timeMin) / (timeMax - timeMin)) * 100;
        const dot = document.createElement('div');
        dot.className = 'event-dot';
        dot.style.left = pct + '%';
        dot.style.background = typeColors[ev.event_type] || '#888';
        dot.title = `${ev.event_type}: ${ev.icao || ''} ${ev.description || ''} (${formatTime(ev.timestamp)})`;
        track.appendChild(dot);
    }
}

// ---- Display update ----
function updateDisplay() {
    if (timeMax <= timeMin) return;

    const slider = document.getElementById('time-slider');
    const pct = ((currentTime - timeMin) / (timeMax - timeMin)) * 10000;
    slider.value = Math.round(pct);

    const timeStr = formatTime(currentTime);
    document.getElementById('time-display').textContent = timeStr;
    const overlay = document.getElementById('timestamp-overlay');
    overlay.textContent = timeStr;
    overlay.style.display = playing ? 'block' : 'none';

    const seen = new Set();
    let acCount = 0;

    Object.keys(acIndex).forEach(icao => {
        const interp = interpolateAt(icao, currentTime);
        if (!interp) return;

        seen.add(icao);
        acCount++;
        const acType = classifyAircraft(interp);

        if (markers[icao]) {
            markers[icao].setLatLng([interp.lat, interp.lon]);
            markers[icao].setIcon(acIcon(interp.heading_deg, interp.is_military, acType));
        } else {
            markers[icao] = L.marker([interp.lat, interp.lon], {
                icon: acIcon(interp.heading_deg, interp.is_military, acType),
            }).addTo(map);
        }
        const label = interp.callsign || interp.registration || interp.icao;
        markers[icao].unbindTooltip();
        markers[icao].bindTooltip(label, { permanent: false, direction: 'right' });

        // Draw trail
        if (trails[icao]) { trails[icao].forEach(s => map.removeLayer(s)); }
        trails[icao] = [];
        const pts = getTrailPoints(icao, currentTime);
        for (let i = 1; i < pts.length; i++) {
            const seg = L.polyline(
                [[pts[i-1].lat, pts[i-1].lon], [pts[i].lat, pts[i].lon]],
                { color: altColor(pts[i].altitude_ft), weight: 2, opacity: 0.6 }
            ).addTo(map);
            trails[icao].push(seg);
        }
    });

    document.getElementById('ac-count').textContent = acCount;

    // Remove aircraft no longer visible
    Object.keys(markers).forEach(k => {
        if (!seen.has(k)) {
            map.removeLayer(markers[k]);
            delete markers[k];
            if (trails[k]) { trails[k].forEach(s => map.removeLayer(s)); delete trails[k]; }
        }
    });
}

// ---- Controls ----
document.getElementById('play-btn').addEventListener('click', function() {
    playing = !playing;
    this.textContent = playing ? 'Pause' : 'Play';
    this.classList.toggle('active', playing);
});

function updateSpeedLabel() {
    const s = speeds[speedIdx];
    document.getElementById('speed-label').textContent = (s >= 60 ? (s/60) + 'm' : s) + 'x';
    playSpeed = s;
}
document.getElementById('speed-up').addEventListener('click', function() {
    if (speedIdx < speeds.length - 1) speedIdx++;
    updateSpeedLabel();
});
document.getElementById('speed-down').addEventListener('click', function() {
    if (speedIdx > 0) speedIdx--;
    updateSpeedLabel();
});

document.getElementById('time-slider').addEventListener('input', function() {
    const pct = this.value / 10000;
    currentTime = timeMin + pct * (timeMax - timeMin);
    updateDisplay();
});

document.getElementById('load-range').addEventListener('click', function() {
    const startVal = document.getElementById('range-start').value;
    const endVal = document.getElementById('range-end').value;
    const start = startVal ? fromDateTimeLocal(startVal) : null;
    const end = endVal ? fromDateTimeLocal(endVal) : null;
    playing = false;
    document.getElementById('play-btn').textContent = 'Play';
    document.getElementById('play-btn').classList.remove('active');
    loadPositions(start, end);
});

document.getElementById('load-all').addEventListener('click', function() {
    playing = false;
    document.getElementById('play-btn').textContent = 'Play';
    document.getElementById('play-btn').classList.remove('active');
    loadPositions(null, null);
});

// ---- Playback loop ----
setInterval(() => {
    if (!playing || timeMax <= timeMin) return;
    currentTime += playSpeed;
    if (currentTime > timeMax) {
        currentTime = timeMin;
    }
    updateDisplay();
}, 100);

// ---- Initial load ----
loadPositions(null, null);
</script>
