<style>
#map { width: 100%; height: calc(100vh - 41px); }

/* Stale-feed banner. Hidden when the feeder is fresh; shows red when
   `/api/stats.feed_age_seconds` exceeds the threshold. Pairs with the
   server-side healthcheck timer + Pi-side crash-on-capture-exit so an
   operator-visible warning appears within ~60s of any feed drop, not 27h
   later by eyeballing an empty map (2026-05-04 incident). */
#feed-stale-banner {
    position: fixed;
    top: 41px;
    left: 0;
    right: 0;
    z-index: 1500;
    background: #7a1a1a;
    color: #fff;
    text-align: center;
    font-size: 12px;
    font-weight: 600;
    padding: 6px 12px;
    border-bottom: 1px solid #a02020;
    display: none;
}
#feed-stale-banner.visible { display: block; }
#feed-stale-banner .feed-stale-age { font-variant-numeric: tabular-nums; }

#control-panel {
    position: absolute;
    top: 56px;
    right: 12px;
    width: 300px;
    max-height: calc(100vh - 110px);
    background: rgba(10,10,10,0.92);
    color: #e0e0e0;
    border-radius: 4px;
    font-size: 12px;
    z-index: 1000;
    border: 1px solid #333;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}
#panel-header {
    padding: 8px 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #333;
    cursor: pointer;
    user-select: none;
}
#panel-header:hover { background: rgba(255,255,255,0.03); }
#panel-header .stat-row { display: flex; gap: 12px; }
.stat-label { color: #888; }
.stat-value { color: #00ff88; font-weight: bold; }
#panel-toggle { color: #666; font-size: 10px; }
#panel-body { overflow-y: auto; }
#panel-body.collapsed { display: none; }
#controls-section { padding: 8px 12px; border-bottom: 1px solid #222; }
#ac-list-section { padding: 4px 8px; overflow-y: auto; }
#ac-list-section h3 { color: #00ff88; margin: 4px 0; font-size: 12px; }
#ac-list-section table { width: 100%; }
#ac-list-section td { padding: 2px 5px; }
#ac-list-section td a { cursor: pointer; }

.leaflet-container { background: #0a0a0a; }

#alt-legend {
    position: absolute;
    bottom: 24px;
    left: 12px;
    background: rgba(0,0,0,0.85);
    border: 1px solid #333;
    border-radius: 4px;
    padding: 8px 12px 8px 10px;
    z-index: 1000;
    font-size: 11px;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
}
#alt-legend .legend-title { color: #888; margin-bottom: 6px; font-size: 10px; text-transform: uppercase; }
#alt-legend .legend-body { display: flex; align-items: stretch; }
#alt-legend .legend-bar {
    width: 14px;
    height: 120px;
    background: linear-gradient(to top, #00ff00, #ffff00 50%, #ff0000);
    border-radius: 2px;
    flex-shrink: 0;
}
#alt-legend .legend-labels {
    margin-left: 6px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    height: 120px;
}
#alt-legend .legend-labels span {
    color: #aaa;
    white-space: nowrap;
    line-height: 1;
}

#cesium-container { width: 100%; height: calc(100vh - 41px); display: none; }
.cesium-viewer .cesium-widget-credits { display: none !important; }
.cesium-viewer .cesium-infoBox { left: 12px; right: auto; }

.ac-popup { font-family: 'Courier New', monospace; font-size: 12px; line-height: 1.5; }
.ac-popup .popup-title { color: #00ff88; font-weight: bold; font-size: 14px; margin-bottom: 4px; }
.ac-popup .popup-row { display: flex; justify-content: space-between; gap: 12px; }
.ac-popup .popup-label { color: #888; }
.ac-popup .popup-value { font-weight: bold; }
.ac-popup .popup-mil { color: #ff4444; }
/* Anomaly score indicators. Three tiers: low (single rule fired),
   med (two rules or moderate stat baseline), high (multiple rules or
   rare-cell statistical signal). Colors picked to read against dark theme
   without colliding with the existing military-red highlight. */
.popup-anomaly-low { color: #ffcc66; }
.popup-anomaly-med { color: #ff9933; }
.popup-anomaly-high { color: #ff4444; font-weight: bold; }
tr.ac-anomaly-low td { background: rgba(255, 204, 102, 0.06); }
tr.ac-anomaly-med td { background: rgba(255, 153, 51, 0.10); }
tr.ac-anomaly-high td { background: rgba(255, 68, 68, 0.12); }
.ac-anomaly-mark {
    display: inline-block;
    margin-left: 6px;
    padding: 0 5px;
    font-size: 10px;
    font-weight: bold;
    border-radius: 3px;
    background: #2a1a00;
}
.ac-anomaly-mark.ac-anomaly-low { color: #ffcc66; border: 1px solid #553300; }
.ac-anomaly-mark.ac-anomaly-med { color: #ff9933; border: 1px solid #663300; }
.ac-anomaly-mark.ac-anomaly-high { color: #ff4444; border: 1px solid #660000; }
.ac-popup a { color: #00aaff; }
.leaflet-popup-content-wrapper { background: #111; color: #e0e0e0; border: 1px solid #333; }
.leaflet-popup-tip { background: #111; }
.ac-ghost td { opacity: 0.45; }
.ac-ghost td a { color: #667; }

.panel-handle { display: none; text-align: center; padding: 8px; cursor: pointer; user-select: none; flex-shrink: 0; }
.panel-handle .handle-bar { display: block; width: 40px; height: 4px; background: rgba(255,255,255,0.3); border-radius: 2px; margin: 0 auto 4px; }
.panel-handle .handle-text { font-size: 11px; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 1px; }

@media (max-width: 768px) {
    #map { height: calc(100vh - 44px); width: 100%; }
    #cesium-container { height: calc(100vh - 44px); }

    #control-panel {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        top: auto;
        width: 100%;
        max-height: 55vh;
        border-radius: 12px 12px 0 0;
        border: none;
        border-top: 1px solid #333;
        transform: translateY(calc(100% - 44px));
        transition: transform 0.3s ease;
        z-index: 1000;
        background: rgba(10,10,10,0.95);
    }
    #control-panel.expanded {
        transform: translateY(0);
    }
    .panel-handle { display: block; }

    #panel-header .stat-row { gap: 8px; font-size: 11px; }

    #controls-section {
        padding: 10px 14px;
    }
    #controls-section label {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 4px;
        font-size: 13px;
        min-height: 36px;
        cursor: pointer;
    }
    #controls-section input[type="checkbox"] {
        width: 18px;
        height: 18px;
        flex-shrink: 0;
    }
    #controls-section input[type="range"] {
        height: 28px;
    }
    #controls-section select {
        font-size: 13px;
        min-height: 36px;
        padding: 4px 8px;
    }
    #controls-section button {
        font-size: 12px;
        min-height: 36px;
        padding: 4px 10px;
    }

    #ac-list-section { max-height: 30vh; overflow-y: auto; }
    #ac-list-section table { font-size: 11px; }
    #ac-list-section td { padding: 4px 4px; }

    #alt-legend {
        bottom: 52px;
        left: 8px;
        padding: 6px 8px;
        font-size: 10px;
    }
    #alt-legend .legend-bar { height: 80px; width: 10px; }
    #alt-legend .legend-labels { height: 80px; font-size: 9px; }

    .leaflet-popup-content-wrapper { max-width: 280px; }
    .ac-popup .popup-row { font-size: 11px; }
}
</style>
<div id="feed-stale-banner" role="status" aria-live="polite">
    Feed is stale — last frame <span class="feed-stale-age" id="feed-stale-age">--</span> ago.
    Receiver may be down. <a href="/receivers" style="color:#fff;text-decoration:underline;">Check receivers</a>.
</div>
<div id="map"></div>
<div id="cesium-container"></div>
<div id="control-panel">
    <div class="panel-handle" onclick="document.getElementById('control-panel').classList.toggle('expanded')">
        <span class="handle-bar"></span>
        <span class="handle-text">Controls</span>
    </div>
    <div id="panel-header">
        <div class="stat-row">
            <span><span class="stat-value" id="so-aircraft">0</span> <span class="stat-label">ac</span></span>
            <span><span class="stat-value" id="so-positions">0</span> <span class="stat-label">pos</span></span>
            <span><span class="stat-value" id="so-events">0</span> <span class="stat-label">evt</span></span>
            <span><span class="stat-value" id="so-uptime">--</span></span>
        </div>
        <span id="panel-toggle">&#9660;</span>
    </div>
    <div id="panel-body">
        <div id="controls-section">
            <div style="display:flex;gap:10px;">
                <label style="cursor:pointer;font-size:11px;"><input type="checkbox" id="trail-toggle" checked> Trails</label>
                <label style="cursor:pointer;font-size:11px;"><input type="checkbox" id="heatmap-toggle"> Heatmap</label>
                <label style="cursor:pointer;font-size:11px;"><input type="checkbox" id="predict-toggle"> Predict</label>
            </div>
            <div id="predict-dur-row" style="margin-top:4px;display:none;">
                <span style="font-size:10px;color:#888;">Predict:</span>
                <span style="font-size:11px;color:#00aaff;float:right;" id="predict-dur-label">10 min</span>
                <input type="range" id="predict-dur-slider" min="0" max="4" value="1" style="width:100%;accent-color:#00aaff;margin-top:2px;">
            </div>
            <div id="heatmap-dur-row" style="margin-top:4px;display:none;">
                <span style="font-size:10px;color:#888;">Heatmap:</span>
                <span style="font-size:11px;color:#ff8800;float:right;" id="heatmap-dur-label">24h</span>
                <input type="range" id="heatmap-dur-slider" min="0" max="7" value="5" style="width:100%;accent-color:#ff8800;margin-top:2px;">
            </div>
            <div style="margin-top:5px;">
                <span style="font-size:10px;color:#888;text-transform:uppercase;">Airports:</span>
                <span style="display:inline-flex;gap:8px;margin-left:6px;">
                    <label style="cursor:pointer;font-size:11px;"><input type="checkbox" id="apt-large"> Major</label>
                    <label style="cursor:pointer;font-size:11px;"><input type="checkbox" id="apt-medium"> Medium</label>
                    <label style="cursor:pointer;font-size:11px;"><input type="checkbox" id="apt-small"> Small</label>
                </span>
            </div>
            <div style="margin-top:4px;">
                <label style="cursor:pointer;font-size:11px;"><input type="checkbox" id="receiver-toggle"> Receivers</label>
                <label style="cursor:pointer;font-size:11px;margin-left:8px;"><input type="checkbox" id="splatlas-toggle" checked> Splatlas</label>
            </div>
            <div style="margin-top:6px;">
                <span style="font-size:10px;color:#888;">Trail:</span>
                <span style="font-size:11px;color:#00ff88;float:right;" id="trail-dur-label">5m</span>
                <input type="range" id="trail-dur-slider" min="0" max="3" value="0" style="width:100%;accent-color:#00ff88;margin-top:2px;">
            </div>
            <div style="margin-top:6px;display:flex;gap:8px;align-items:center;">
                <label style="cursor:pointer;font-size:11px;"><input type="checkbox" id="notify-toggle"> Alerts</label>
                <label style="cursor:pointer;font-size:11px;"><input type="checkbox" id="audio-toggle"> Sound</label>
                <button id="add-geofence-btn" style="font-size:10px;padding:2px 6px;background:#222;color:#00ff88;border:1px solid #444;border-radius:3px;cursor:pointer;" title="Click map to place geofence">+ Fence</button>
            </div>
            <div id="geofence-list" style="margin-top:4px;font-size:10px;color:#888;max-height:60px;overflow-y:auto;"></div>
            <div style="margin-top:4px;display:flex;gap:8px;flex-wrap:wrap;">
                <label style="cursor:pointer;font-size:11px;"><input type="checkbox" id="events-toggle"> Events</label>
                <label style="cursor:pointer;font-size:11px;"><input type="checkbox" id="military-highlight"> Military</label>
                <label style="cursor:pointer;font-size:11px;"><input type="checkbox" id="range-toggle"> Range</label>
                <label style="cursor:pointer;font-size:11px;"><input type="checkbox" id="airspace-toggle"> Airspace</label>
                <label style="cursor:pointer;font-size:11px;"><input type="checkbox" id="vessel-toggle"> Vessels</label>
                <label style="cursor:pointer;font-size:11px;" title="Live precipitation radar via RainViewer"><input type="checkbox" id="weather-toggle"> Weather</label>
            </div>
            <div style="margin-top:6px;display:flex;align-items:center;">
                <span style="font-size:10px;color:#888;text-transform:uppercase;">Map:</span>
                <select id="map-style" style="font-size:11px;background:#222;color:#ccc;border:1px solid #444;border-radius:3px;padding:1px 4px;margin-left:4px;">
                    <option value="dark">Dark</option>
                    <option value="satellite">Satellite</option>
                    <option value="topo">Topo</option>
                    <option value="streets">Streets</option>
                    <option value="dark-matter">Dark Matter</option>
                    <option value="voyager">Voyager</option>
                </select>
                <button id="mode-3d-btn" style="font-size:10px;padding:2px 6px;background:#222;color:#00aaff;border:1px solid #444;border-radius:3px;cursor:pointer;margin-left:auto;" title="Switch to 3D globe view">3D</button>
            </div>
        </div>
        <div id="ac-list-section">
            <h3>Aircraft (<span id="ac-count">0</span>)</h3>
            <table id="ac-table">
                <thead>
                    <tr><th>ICAO</th><th>Call</th><th>Alt</th><th>Spd</th><th>Hdg</th></tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>
<div id="alt-legend">
    <div class="legend-title">Altitude</div>
    <div class="legend-body">
        <div class="legend-bar"></div>
        <div class="legend-labels">
            <span>40,000 ft</span>
            <span>30,000 ft</span>
            <span>20,000 ft</span>
            <span>10,000 ft</span>
            <span>0 ft</span>
        </div>
    </div>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
<script src="/assets/map.js"></script>
